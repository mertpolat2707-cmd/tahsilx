version: "3.9"

services:
  db:
    image: postgres:15
    container_name: tahsilix-db-1
    restart: always
    environment:
      POSTGRES_DB: tahsilix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  api:
    image: python:3.12-slim
    container_name: tahsilix-api-1
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    depends_on:
      - db
    command: bash -lc "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"